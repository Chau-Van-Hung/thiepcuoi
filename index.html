<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Wedding Invitation</title>

<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@600&family=Poppins:wght@300;400;500&display=swap" rel="stylesheet">

<style>
*{
  margin:0;
  padding:0;
  box-sizing:border-box;
}

body{
  font-family:'Poppins', sans-serif;
  background:linear-gradient(135deg,#ffe6f0,#ffd1e8,#ffc2dd);
  color:#b30059;
  overflow-x:hidden;
}

/* HERO */
.hero{
  height:100vh;
  display:flex;
  justify-content:center;
  align-items:center;
  text-align:center;
  position:relative;
  padding:20px;
}

.content{
  width:100%;
  max-width:500px;
  background:rgba(255,255,255,0.6);
  backdrop-filter:blur(10px);
  padding:40px 25px;
  border-radius:20px;
  box-shadow:0 10px 40px rgba(255,105,180,0.25);
}

h1{
  font-family:'Playfair Display', serif;
  font-size:clamp(28px,7vw,48px);
  color:#e60073;
}

.names{
  font-size:clamp(20px,5vw,28px);
  margin:15px 0;
  font-weight:500;
}

.date{
  letter-spacing:3px;
  margin-bottom:20px;
  font-size:14px;
}

/* COUNTDOWN */
.countdown{
  display:grid;
  grid-template-columns:repeat(4,1fr);
  gap:10px;
  margin-top:20px;
}

.box{
  background:white;
  padding:15px 5px;
  border-radius:12px;
  font-size:14px;
  box-shadow:0 4px 15px rgba(255,105,180,0.2);
}

.box span{
  font-size:18px;
  font-weight:500;
  color:#e60073;
}

/* RSVP SECTION */
.rsvp{
  padding:60px 20px;
}

.rsvp h2{
  text-align:center;
  margin-bottom:30px;
  font-family:'Playfair Display', serif;
  color:#e60073;
}

form{
  max-width:500px;
  margin:auto;
  display:flex;
  flex-direction:column;
  gap:15px;
}

input, textarea, select{
  padding:14px;
  border-radius:12px;
  border:1px solid #ffb3d9;
  font-size:14px;
  background:white;
  color:#333;
}

input:focus, textarea:focus, select:focus{
  outline:none;
  border:1px solid #ff66a3;
  box-shadow:0 0 8px rgba(255,102,163,0.4);
}

button{
  padding:14px;
  border:none;
  border-radius:30px;
  background:linear-gradient(45deg,#ff66a3,#ff3385);
  color:white;
  font-size:15px;
  font-weight:500;
  cursor:pointer;
  transition:0.3s;
}

button:hover{
  transform:translateY(-2px);
  box-shadow:0 6px 20px rgba(255,0,102,0.3);
}

button:active{
  transform:scale(0.97);
}

/* FALLING EFFECT */
.effect{
  position:fixed;
  top:-10px;
  pointer-events:none;
  animation:fall linear forwards;
}

@keyframes fall{
  to{
    transform:translateY(110vh) rotate(360deg);
  }
}

@media(max-width:480px){
  .content{
    padding:30px 20px;
  }
}
</style>
</head>
<body>

<section class="hero">
  <div class="content">
    <h1>We Are Getting Married</h1>
    <div class="names">Hưng ❤️ Quỳnh</div>
    <div class="date">20 • 12 • 2026</div>

    <div class="countdown">
      <div class="box"><span id="d">0</span><br>Ngày</div>
      <div class="box"><span id="h">0</span><br>Giờ</div>
      <div class="box"><span id="m">0</span><br>Phút</div>
      <div class="box"><span id="s">0</span><br>Giây</div>
    </div>
  </div>
</section>

<section class="rsvp">
  <h2>Xác nhận tham dự</h2>
  <form id="rsvpForm">
    <input type="text" name="name" placeholder="Tên của bạn" required>
    <input type="tel" name="phone" placeholder="Số điện thoại" required>
    <select name="guests">
      <option value="1">1 người</option>
      <option value="2">2 người</option>
      <option value="3">3 người</option>
      <option value="4">4 người</option>
    </select>
    <textarea name="message" rows="3" placeholder="Lời chúc gửi cô dâu chú rể"></textarea>
    <button type="submit">Gửi xác nhận</button>
  </form>
</section>

<script>
/* COUNTDOWN */
const date = new Date("Dec 20, 2026 11:00:00").getTime();
setInterval(()=>{
  const now = new Date().getTime();
  const diff = date - now;

  document.getElementById("d").innerHTML = Math.floor(diff/(1000*60*60*24));
  document.getElementById("h").innerHTML = Math.floor((diff%(1000*60*60*24))/(1000*60*60));
  document.getElementById("m").innerHTML = Math.floor((diff%(1000*60*60))/(1000*60));
  document.getElementById("s").innerHTML = Math.floor((diff%(1000*60))/1000);
},1000);

/* FLOWER + HEART */
function create(symbol){
  const el = document.createElement("div");
  el.classList.add("effect");
  el.innerHTML = symbol;
  el.style.left = Math.random()*100 + "vw";
  el.style.fontSize = (14+Math.random()*20)+"px";
  el.style.animationDuration = (6+Math.random()*4)+"s";
  document.body.appendChild(el);
  setTimeout(()=>el.remove(),10000);
}

setInterval(()=>create("🌸"),800);
setInterval(()=>create("❤️"),1200);

/* GIỮ NGUYÊN LOGIC GỬI GOOGLE SHEET */
document.getElementById("rsvpForm").addEventListener("submit", function(e){
  e.preventDefault();

  fetch("https://script.google.com/macros/s/AKfycbxukNX3NDVDkH1sqpkCUYH2QUdykyAPZTAi6sP3cdHaNgmg7Tym1n4rIkj2YsJsaSXeDg/exec",{
    method:"POST",
    body:JSON.stringify({
      name:this.name.value,
      phone:this.phone.value,
      guests:this.guests.value,
      message:this.message.value
    })
  });

  alert("Đã gửi xác nhận ❤️");
  this.reset();
});
</script>

</body>
</html>
