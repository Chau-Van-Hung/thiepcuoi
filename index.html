<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Wedding Invitation</title>

<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@600&family=Poppins:wght@300;400&display=swap" rel="stylesheet">

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    font-family:'Poppins', sans-serif;
    overflow:hidden;
    color:white;
}

/* FULL SCREEN */
.hero{
    height:100vh;
    background:url('https://images.unsplash.com/photo-1519741497674-611481863552') center/cover no-repeat;
    position:relative;
    display:flex;
    justify-content:center;
    align-items:center;
    text-align:center;
}

.overlay{
    position:absolute;
    width:100%;
    height:100%;
    background:rgba(0,0,0,0.6);
}

.content{
    position:relative;
    z-index:2;
}

h1{
    font-family:'Playfair Display', serif;
    font-size:60px;
}

.names{
    font-size:35px;
    margin:20px 0;
}

.date{
    font-size:22px;
    letter-spacing:3px;
}

/* COUNTDOWN */
.countdown{
    margin-top:30px;
    display:flex;
    justify-content:center;
    gap:30px;
    font-size:18px;
}

.countdown div{
    background:rgba(255,255,255,0.15);
    padding:15px 20px;
    border-radius:10px;
}

/* FLOWERS */
.flower, .heart{
    position:fixed;
    top:-10px;
    pointer-events:none;
    animation:fall linear infinite;
}

@keyframes fall{
    to{
        transform:translateY(110vh) rotate(360deg);
    }
}
</style>
</head>
<body>

<section class="hero">
    <div class="overlay"></div>
    <div class="content">
        <h1>We Are Getting Married</h1>
        <div class="names">Châu Văn Hưng ❤️ Trần Thị Như Quỳnh</div>
        <div class="date">20 • 12 • 2026</div>

        <div class="countdown">
            <div><span id="days">0</span><br>Ngày</div>
            <div><span id="hours">0</span><br>Giờ</div>
            <div><span id="minutes">0</span><br>Phút</div>
            <div><span id="seconds">0</span><br>Giây</div>
        </div>
    </div>
</section>

<script>

/* COUNTDOWN */
const weddingDate = new Date("Dec 20, 2026 11:00:00").getTime();

setInterval(function(){
    const now = new Date().getTime();
    const distance = weddingDate - now;

    const days = Math.floor(distance / (1000*60*60*24));
    const hours = Math.floor((distance % (1000*60*60*24))/(1000*60*60));
    const minutes = Math.floor((distance % (1000*60*60))/(1000*60));
    const seconds = Math.floor((distance % (1000*60))/1000);

    document.getElementById("days").innerHTML = days;
    document.getElementById("hours").innerHTML = hours;
    document.getElementById("minutes").innerHTML = minutes;
    document.getElementById("seconds").innerHTML = seconds;

},1000);


/* FLOWERS + HEARTS */
function createEffect(symbol, className){
    const el = document.createElement("div");
    el.classList.add(className);
    el.innerHTML = symbol;

    el.style.left = Math.random()*100 + "vw";
    el.style.fontSize = (15 + Math.random()*25) + "px";
    el.style.animationDuration = (5 + Math.random()*5) + "s";

    document.body.appendChild(el);

    setTimeout(()=>{ el.remove(); }, 10000);
}

setInterval(()=>{
    createEffect("🌸","flower");
},500);

setInterval(()=>{
    createEffect("❤️","heart");
},800);

</script>

</body>
</html>
