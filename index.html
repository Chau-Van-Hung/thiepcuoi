<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Thiệp Cưới Online</title>

<link href="https://fonts.googleapis.com/css2?family=Dancing+Script:wght@600&family=Montserrat:wght@300;400&display=swap" rel="stylesheet">

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    font-family: 'Montserrat', sans-serif;
    background: linear-gradient(135deg,#fceabb,#f8b500);
    display:flex;
    justify-content:center;
    align-items:center;
    height:100vh;
    overflow:hidden;
}

.card{
    background:white;
    padding:40px;
    border-radius:20px;
    width:350px;
    text-align:center;
    box-shadow:0 20px 40px rgba(0,0,0,0.2);
    animation: fadeIn 2s ease;
}

h1{
    font-family: 'Dancing Script', cursive;
    font-size:40px;
    color:#d6336c;
}

.names{
    font-size:28px;
    margin:15px 0;
    color:#333;
    font-weight:500;
}

.date{
    margin:10px 0;
    font-size:18px;
    color:#555;
}

.location{
    margin-top:10px;
    font-size:16px;
    color:#777;
}

.button{
    margin-top:25px;
    display:inline-block;
    padding:10px 20px;
    background:#d6336c;
    color:white;
    text-decoration:none;
    border-radius:25px;
    transition:0.3s;
}

.button:hover{
    background:#ad1457;
    transform:scale(1.1);
}

@keyframes fadeIn{
    from{opacity:0; transform:translateY(30px);}
    to{opacity:1; transform:translateY(0);}
}
</style>
</head>

<body>

<div class="card">
    <h1>Wedding Invitation</h1>
    <div class="names">Nguyễn Văn A ❤️ Trần Thị B</div>
    <div class="date">Chủ Nhật, 20/12/2026</div>
    <div class="date">Lúc 11:00 AM</div>
    <div class="location">Nhà Hàng ABC - Đà Nẵng</div>
    <a href="#" class="button">Xác nhận tham dự</a>
</div>

</body>
</html>
