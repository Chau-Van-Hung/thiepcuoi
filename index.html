<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Wedding Invitation</title>

<link href="https://fonts.googleapis.com/css2?family=Great+Vibes&family=Montserrat:wght@300;500;700&display=swap" rel="stylesheet">

<style>
*{margin:0;padding:0;box-sizing:border-box}
body{
    font-family: 'Montserrat', sans-serif;
    background: linear-gradient(to bottom,#ffd6e7,#fff);
    overflow-x:hidden;
    text-align:center;
    color:#b30059;
}

/* Màn hình mở thiệp */
#cover{
    position:fixed;
    inset:0;
    background:linear-gradient(135deg,#ffb6d5,#ffd6ec);
    display:flex;
    justify-content:center;
    align-items:center;
    flex-direction:column;
    z-index:999;
}

#openBtn{
    padding:15px 40px;
    border:none;
    border-radius:50px;
    font-size:18px;
    background:white;
    color:#e60073;
    cursor:pointer;
    box-shadow:0 5px 15px rgba(0,0,0,.2);
}

.container{
    padding:60px 20px;
    display:none;
}

h1{
    font-family:'Great Vibes',cursive;
    font-size:55px;
}

.names{
    font-size:28px;
    font-weight:700;
    margin:10px 0;
}

.we{
    font-size:22px;
    margin:10px 0;
}

.countdown{
    margin:20px 0;
    font-size:20px;
}

.section{
    margin:40px 0;
}

input,textarea{
    width:100%;
    max-width:400px;
    padding:12px;
    margin:8px auto;
    border-radius:10px;
    border:1px solid #ff99cc;
}

button.submit{
    padding:12px 30px;
    border:none;
    border-radius:30px;
    background:#ff66a3;
    color:white;
    font-size:16px;
    cursor:pointer;
}

/* sóng nhạc */
.music-wave{
    display:flex;
    justify-content:center;
    gap:4px;
    margin-top:15px;
}
.music-wave span{
    width:4px;
    height:15px;
    background:#ff3399;
    animation:wave 1s infinite ease-in-out;
}
.music-wave span:nth-child(2){animation-delay:.1s}
.music-wave span:nth-child(3){animation-delay:.2s}
.music-wave span:nth-child(4){animation-delay:.3s}
.music-wave span:nth-child(5){animation-delay:.4s}

@keyframes wave{
    0%,100%{height:15px}
    50%{height:35px}
}

/* tim bay */
.heart{
    position:fixed;
    bottom:-10px;
    color:#ff3399;
    animation:fly 6s linear infinite;
    font-size:20px;
}
@keyframes fly{
    0%{transform:translateY(0) scale(1);opacity:1}
    100%{transform:translateY(-100vh) scale(1.5);opacity:0}
}

@media(max-width:480px){
    h1{font-size:40px}
    .names{font-size:22px}
}
</style>
</head>

<body>

<div id="cover">
    <h1>Wedding Invitation</h1>
    <button id="openBtn">💌 MỞ THIỆP</button>
</div>

<div class="container" id="main">

    <h1>We Are One</h1>

    <div class="names">Châu Văn Hưng</div>
    <div class="we">&</div>
    <div class="names">Người Ấy 💖</div>

    <div class="countdown" id="countdown"></div>

    <div class="music-wave" id="wave" style="display:none;">
        <span></span><span></span><span></span><span></span><span></span>
    </div>

    <div class="section">
        <h2>Xác nhận tham dự</h2>
        <input type="text" id="name" placeholder="Tên của bạn">
        <textarea id="message" placeholder="Lời chúc..."></textarea>
        <button class="submit" onclick="sendRSVP()">Gửi lời chúc</button>
        <p id="status"></p>
    </div>

</div>

<audio id="music" loop>
<source src="https://www.soundhelix.com/examples/mp3/SoundHelix-Song-1.mp3" type="audio/mp3">
</audio>

<script>

const openBtn=document.getElementById("openBtn");
const cover=document.getElementById("cover");
const main=document.getElementById("main");
const music=document.getElementById("music");
const wave=document.getElementById("wave");

openBtn.onclick=function(){
    cover.style.display="none";
    main.style.display="block";
    music.play();
    wave.style.display="flex";
}

/* Countdown */
const weddingDate=new Date("2026-12-20 18:00:00").getTime();
setInterval(()=>{
    const now=new Date().getTime();
    const distance=weddingDate-now;
    const d=Math.floor(distance/(1000*60*60*24));
    document.getElementById("countdown").innerHTML="Còn "+d+" ngày nữa 💍";
},1000);

/* Gửi sheet */
function sendRSVP(){
    const name=document.getElementById("name").value;
    const message=document.getElementById("message").value;

    fetch("https://script.google.com/macros/s/AKfycbxukNX3NDVDkH1sqpkCUYH2QUdykyAPZTAi6sP3cdHaNgmg7Tym1n4rIkj2YsJsaSXeDg/exec",{
        method:"POST",
        body:JSON.stringify({name:name,message:message}),
        headers:{"Content-Type":"application/json"}
    })
    .then(res=>res.text())
    .then(data=>{
        document.getElementById("status").innerHTML="Đã gửi thành công 💖";
    })
    .catch(err=>{
        document.getElementById("status").innerHTML="Lỗi gửi!";
    });
}

/* tim bay */
setInterval(()=>{
    const heart=document.createElement("div");
    heart.className="heart";
    heart.innerHTML="💖";
    heart.style.left=Math.random()*100+"vw";
    document.body.appendChild(heart);
    setTimeout(()=>heart.remove(),6000);
},800);

</script>

</body>
</html>
