<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Wedding Invitation</title>

<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@600&family=Poppins:wght@300;400;500&family=Great+Vibes&display=swap" rel="stylesheet">

<style>
*{margin:0;padding:0;box-sizing:border-box}

body{
  font-family:'Poppins', sans-serif;
  background:#fff0f5;
  overflow:hidden;
}

/* ===== BOOK ===== */
.book{
  position:fixed;
  width:100%;
  height:100vh;
  display:flex;
  perspective:2000px;
}

/* 2 cánh */
.page{
  width:50%;
  height:100%;
  background:#ffcce0;
  display:flex;
  justify-content:center;
  align-items:center;
  flex-direction:column;
  transition:1s;
  transform-origin:left;
  z-index:2;
}

.page.right{
  transform-origin:right;
  background:#ffb3d9;
}

.page h2{
  font-family:'Great Vibes', cursive;
  font-size:40px;
  color:white;
}

.open-btn{
  margin-top:20px;
  padding:12px 30px;
  border:none;
  border-radius:30px;
  background:white;
  color:#ff3385;
  cursor:pointer;
}

/* khi mở */
.open .left{
  transform:rotateY(-180deg);
}
.open .right{
  transform:rotateY(180deg);
}

/* ===== NỘI DUNG ===== */
.main{
  position:absolute;
  width:100%;
  height:100%;
  overflow-y:auto;
  background:linear-gradient(135deg,#fff0f5,#ffe4ec);
  display:none;
}

/* HERO */
.hero{
  height:100vh;
  display:flex;
  justify-content:center;
  align-items:center;
  text-align:center;
}

.content{
  max-width:500px;
  background:white;
  padding:40px 20px;
  border-radius:20px;
}

h1{
  font-family:'Playfair Display', serif;
}

.names{
  font-family:'Great Vibes', cursive;
  font-size:40px;
  color:#e60073;
}

.countdown{
  display:grid;
  grid-template-columns:repeat(4,1fr);
  gap:10px;
  margin-top:20px;
}

.box{
  background:#fff;
  padding:10px;
  border-radius:10px;
}

/* RSVP */
.rsvp{
  padding:50px 20px;
}

form{
  max-width:400px;
  margin:auto;
  display:flex;
  flex-direction:column;
  gap:10px;
}

input,textarea,select{
  padding:12px;
  border-radius:10px;
  border:1px solid #ff99cc;
}

button{
  padding:12px;
  border:none;
  border-radius:25px;
  background:#ff66a3;
  color:white;
}

/* hiệu ứng */
.effect{
  position:fixed;
  top:-10px;
  animation:fall linear forwards;
}

@keyframes fall{
  to{transform:translateY(110vh)}
}
</style>
</head>

<body>

<!-- BOOK -->
<div class="book" id="book">
  <div class="page left">
    <h2>Wedding</h2>
  </div>

  <div class="page right">
    <h2>Invitation</h2>
    <button class="open-btn" onclick="openBook()">Mở thiệp</button>
  </div>
</div>

<!-- MAIN -->
<div class="main" id="main">

<section class="hero">
  <div class="content">
    <h1>We Are Getting Married</h1>
    <div class="names">Hưng ❤️ Quỳnh</div>

    <div class="countdown">
      <div class="box"><span id="d">0</span><br>Ngày</div>
      <div class="box"><span id="h">0</span><br>Giờ</div>
      <div class="box"><span id="m">0</span><br>Phút</div>
      <div class="box"><span id="s">0</span><br>Giây</div>
    </div>
  </div>
</section>

<section class="rsvp">
  <form id="rsvpForm">
    <input type="text" name="name" placeholder="Tên của bạn" required>
    <input type="tel" name="phone" placeholder="SĐT" required>
    <select name="guests">
      <option value="1">1 người</option>
      <option value="2">2 người</option>
    </select>
    <textarea name="message" placeholder="Lời chúc"></textarea>
    <button type="submit">Gửi</button>
  </form>
</section>

</div>

<script>

/* mở sách */
function openBook(){
  document.getElementById("book").classList.add("open");

  setTimeout(()=>{
    document.getElementById("book").style.display="none";
    document.getElementById("main").style.display="block";
    document.body.style.overflow="auto";
  },1000);
}

/* countdown */
const date=new Date("Dec 20, 2028 11:00:00").getTime();
setInterval(()=>{
  const now=new Date().getTime();
  const diff=date-now;

  document.getElementById("d").innerHTML=Math.floor(diff/(1000*60*60*24));
  document.getElementById("h").innerHTML=Math.floor((diff%(1000*60*60*24))/(1000*60*60));
  document.getElementById("m").innerHTML=Math.floor((diff%(1000*60*60))/(1000*60));
  document.getElementById("s").innerHTML=Math.floor((diff%(1000*60))/1000);
},1000);

/* gửi sheet – giữ nguyên */
document.getElementById("rsvpForm").addEventListener("submit", function(e){
  e.preventDefault();

  fetch("https://script.google.com/macros/s/AKfycbxukNX3NDVDkH1sqpkCUYH2QUdykyAPZTAi6sP3cdHaNgmg7Tym1n4rIkj2YsJsaSXeDg/exec",{
    method:"POST",
    body:JSON.stringify({
      name:this.name.value,
      phone:this.phone.value,
      guests:this.guests.value,
      message:this.message.value
    })
  });

  alert("Đã gửi ❤️");
  this.reset();
});

/* hoa rơi */
function create(){
  const el=document.createElement("div");
  el.className="effect";
  el.innerHTML="💖";
  el.style.left=Math.random()*100+"vw";
  el.style.fontSize="20px";
  el.style.animationDuration="6s";
  document.body.appendChild(el);
  setTimeout(()=>el.remove(),6000);
}
setInterval(create,1000);

</script>

</body>
</html>
